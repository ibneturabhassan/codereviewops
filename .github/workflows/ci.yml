name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -m "not live"
      - run: uv build
      - name: Evaluation smoke test
        run: >-
          uv run codereviewops review
          --task benchmarks/tasks/http_retry_001.json
          --provider replay
          --output-dir artifacts/smoke
