name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - name: Generated benchmark drift check
        run: >-
          uv run codereviewops benchmark generate
          --source benchmarks/source
          --output-root benchmarks/tasks
          --check
      - name: Local MCP stdio integration
        run: uv run pytest tests/test_mcp.py -m mcp
      - run: uv run pytest -m "not live and not docker"
      - run: uv build
      - name: Evaluation smoke test
        run: >-
          uv run codereviewops review
          --task benchmarks/tasks/http_retry_001.json
          --provider replay
          --output-dir artifacts/smoke

  docker-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: Build pinned tool runner
        run: >-
          docker build
          --pull=false
          --file runner/Dockerfile
          --tag codereviewops/python-unittest:0.1.0
          .
      - name: Validate canonical benchmark suite
        run: >-
          uv run codereviewops benchmark validate
          --suite benchmarks/tasks/suites/m4_25.json
      - name: Strict replay transport regression
        run: >-
          uv run codereviewops benchmark run
          --matrix benchmarks/matrices/m4_replay_transport_v1.json
          --output-dir artifacts/m4-replay
      - name: Tool workflow replay smoke
        run: >-
          uv run codereviewops review
          --task benchmarks/tasks/python_tools_001.json
          --provider replay
          --output-dir artifacts/tool-smoke
      - run: uv run pytest -m docker
